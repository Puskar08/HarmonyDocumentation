<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Harmony Bridge | User Manual — Collapsible Sidebar Navigation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <div class="top-bar">
            <div class="logo-area">
                <h1>Harmony Bridge</h1>
                <!-- <span>User Manual</span> -->
                <button class="nav-toggle-btn" id="toggleNavBtn" aria-label="Toggle navigation">
                    <span>☰</span>
                </button>
            </div>
            <div class="header-actions">
                <div class="search-area">
                    <input type="text" id="searchInput" placeholder="Search here... (e.g., symbol map, routing)">
                    <button id="searchBtn">🔍</button>
                </div>
            </div>
        </div>
        <div class="main-layout">
            <div class="nav-panel" id="sidebarNav"></div>
            <div class="content-area" id="mainContent"></div>
        </div>
    </div>

    <!-- Page Modules - Each in separate file -->
    <script src="pages/get_started.js"></script>
    <script src="pages/welcome.js"></script>
    <script src="pages/symbols_map.js"></script>
    <script src="pages/pricing_groups.js"></script>
    <script src="pages/routing_engine.js"></script>
    <script src="pages/scalper_detection.js"></script>
    <script src="pages/order_details.js"></script>
    <script src="pages/taker.js"></script>
    <script src="pages/taker_pricing.js"></script>
    <script src="pages/taker_trading.js"></script>
    <script src="pages/taker_drop_copy.js"></script>

    <script src="pages/maker.js"></script>
    <script src="pages/maker_pricing.js"></script>
    <script src="pages/maker_trading.js"></script>
    <script src="pages/maker_drop_copy.js"></script>
    <script src="pages/maker_conversions.js"></script>
    <script src="pages/maker_pools.js"></script>

    <script src="pages/configuration.js"></script>
    <script src="pages/configuration_market_sessions.js"></script>
    <script src="pages/configuration_event_sessions.js"></script>
    <script src="pages/configuration_bridge_symbols.js"></script>
    <script src="pages/configuration_providers.js"></script>
    <script src="pages/configuration_connectors.js"></script>
    <script src="pages/configuration_integrations.js"></script>
    <script src="pages/screening.js"></script>
    <script src="pages/administration.js"></script>
    <!-- main app -->
    <script src="app.js"></script>
</body>

</html>
